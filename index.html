<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字分享卡片工坊</title>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%2308111d"/><path d="M18 18h28v6H18zm0 11h20v6H18zm0 11h28v6H18z" fill="%23ffd36d"/></svg>'
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script id="qriousScript" defer src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
      :root {
        --bg: #eee6db;
        --bg-deep: #e4d7c7;
        --panel: rgba(255, 250, 243, 0.84);
        --panel-strong: rgba(255, 252, 247, 0.94);
        --panel-border: rgba(76, 58, 41, 0.12);
        --line-strong: rgba(76, 58, 41, 0.18);
        --text: #1f1a16;
        --muted: #6f645a;
        --soft: #9b8f84;
        --accent: #2d241d;
        --accent-soft: #8a5f37;
        --accent-wash: rgba(138, 95, 55, 0.14);
        --shadow: 0 20px 60px rgba(57, 40, 22, 0.09);
        --shadow-soft: 0 10px 30px rgba(57, 40, 22, 0.06);
        --font-sans: "Noto Sans SC", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
        --font-serif: "Noto Serif SC", "Songti SC", STSong, serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #18130f;
          --bg-deep: #201914;
          --panel: rgba(34, 27, 23, 0.82);
          --panel-strong: rgba(40, 31, 26, 0.92);
          --panel-border: rgba(255, 243, 231, 0.1);
          --line-strong: rgba(255, 243, 231, 0.16);
          --text: #f3ece2;
          --muted: #c3b5a7;
          --soft: #998c7d;
          --accent: #f4e8da;
          --accent-soft: #d2a879;
          --accent-wash: rgba(210, 168, 121, 0.12);
          --shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
          --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.22);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      html {
        color-scheme: light dark;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at top left, rgba(176, 127, 84, 0.18), transparent 24%),
          radial-gradient(circle at 92% 8%, rgba(98, 126, 156, 0.13), transparent 22%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-deep) 100%);
        color: var(--text);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(92, 68, 44, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(92, 68, 44, 0.03) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at center, black 24%, transparent 82%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at center, transparent 54%, rgba(80, 54, 30, 0.08) 100%);
        mix-blend-mode: multiply;
      }

      .app {
        width: min(1360px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 36px 0 72px;
      }

      .hero {
        display: grid;
        gap: 22px;
        margin-bottom: 30px;
      }

      .hero-grid {
        display: block;
      }

      .hero-kicker {
        margin: 0 0 10px;
        color: var(--text);
        font-size: clamp(32px, 5.4vw, 68px);
        font-weight: 500;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      h1 {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 16px;
        font-weight: 400;
        line-height: 1.75;
        letter-spacing: 0;
        color: var(--muted);
        max-width: 38ch;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(330px, 420px) minmax(0, 1fr);
        gap: clamp(20px, 2.8vw, 34px);
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .controls {
        position: relative;
        padding: clamp(22px, 3vw, 34px);
        display: grid;
        gap: 22px;
        overflow: hidden;
      }

      .controls::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 120px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), transparent);
        pointer-events: none;
      }

      .panel-heading,
      .preview-copy-wrap {
        display: grid;
        gap: 8px;
      }

      .section-title {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--soft);
      }

      .panel-copy,
      .preview-copy {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.75;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .field label {
        font-size: 13px;
        color: var(--muted);
      }

      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.54);
        color: var(--text);
        padding: 14px 16px;
        font-family: inherit;
        font-size: 14px;
        line-height: 1.6;
        outline: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
        transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, background 180ms ease;
      }

      textarea {
        min-height: 230px;
        resize: vertical;
      }

      textarea::placeholder,
      input::placeholder {
        color: color-mix(in srgb, var(--soft) 80%, transparent);
      }

      textarea:hover,
      input:hover,
      select:hover {
        border-color: var(--line-strong);
      }

      textarea:focus,
      input:focus,
      select:focus {
        border-color: color-mix(in srgb, var(--accent-soft) 55%, var(--accent));
        background: rgba(255, 255, 255, 0.72);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.62),
          0 0 0 4px var(--accent-wash);
      }

      select {
        appearance: none;
        cursor: pointer;
        padding-right: 42px;
        background-image: url("data:image/svg+xml,%3Csvg width='14' height='10' viewBox='0 0 14 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 2.25L7 7.25L12 2.25' stroke='%23716358' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 16px center;
      }

      .quick-actions,
      .subgrid {
        display: grid;
        gap: 12px;
      }

      .quick-actions {
        grid-template-columns: 1fr 1fr;
      }

      .subgrid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .download-action {
        display: block;
      }

      .download-action button {
        width: 100%;
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 18px;
        padding: 14px 18px;
        background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 84%, #5a4330) 100%);
        color: color-mix(in srgb, var(--panel-strong) 88%, white);
        font-family: inherit;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.01em;
        cursor: pointer;
        box-shadow: 0 16px 28px rgba(45, 36, 29, 0.18);
        transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 20px 34px rgba(45, 36, 29, 0.22);
      }

      button:active {
        transform: translateY(0);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.45);
        color: var(--text);
        border-color: var(--panel-border);
        box-shadow: none;
      }

      button.secondary:hover {
        background: rgba(255, 255, 255, 0.68);
      }

      .helper {
        margin: 0;
        padding-top: 6px;
        border-top: 1px solid rgba(95, 71, 46, 0.1);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.8;
      }

      .preview-panel {
        position: sticky;
        top: 28px;
        padding: clamp(22px, 3vw, 34px);
        display: grid;
        gap: 18px;
        background: rgba(255, 250, 244, 0.42);
        box-shadow: var(--shadow-soft);
      }

      .preview-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 16px;
      }

      .dimension-label {
        margin: 0;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(95, 71, 46, 0.1);
        background: rgba(255, 255, 255, 0.42);
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .canvas-shell {
        position: relative;
        width: 100%;
        max-width: 620px;
        margin: 0 auto;
        padding: clamp(14px, 2vw, 22px);
        border-radius: 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.22)),
          rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(95, 71, 46, 0.08);
        box-shadow: 0 14px 28px rgba(51, 36, 24, 0.08);
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 8px;
        box-shadow: 0 14px 28px rgba(51, 36, 24, 0.1);
        background: transparent;
      }

      .status {
        min-height: 20px;
        margin: 0;
        color: #b74b5b;
        font-size: 13px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      .mobile-download-btn {
        display: none;
        width: 100%;
        max-width: 620px;
        margin: 2px auto 0;
      }

      .helper-link {
        display: inline-block;
        margin-top: 10px;
        color: var(--soft);
        font-size: 12px;
        text-decoration: none;
      }

      .helper-link:hover {
        color: var(--text);
      }

      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .preview-panel {
          position: static;
        }
      }

      @media (max-width: 720px) {
        .app {
          width: min(100vw - 24px, 1360px);
          padding: 20px 0 56px;
        }

        h1 {
          font-size: 15px;
          max-width: 30ch;
        }

        .hero-kicker {
          font-size: clamp(30px, 9.6vw, 42px);
        }

        .hero {
          margin-bottom: 24px;
        }

        .controls,
        .preview-panel {
          padding: 20px 18px;
          border-radius: 14px;
        }

        .subgrid {
          grid-template-columns: 1fr;
        }

        .preview-head {
          flex-direction: column;
        }

        .mobile-download-btn {
          display: block;
        }
      }

      @media (max-width: 560px) {
        .quick-actions {
          grid-template-columns: 1fr;
        }

        textarea {
          min-height: 190px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div class="hero-grid">
          <div class="hero-copy">
            <p class="hero-kicker">Text Card Maker</p>
            <h1>把文字整理成适合分享的卡片，支持添加链接生成二维码</h1>
          </div>
        </div>
      </section>

      <section class="workspace">
        <form class="panel controls" id="controlsForm">
          <div class="panel-heading">
            <h2 class="section-title">编辑内容</h2>
          </div>

          <div class="field">
            <label for="contentInput">文字内容</label>
            <textarea id="contentInput" spellcheck="false" placeholder="直接粘贴文章、摘录、短评、金句都可以。段落之间用空行分隔。" autofocus></textarea>
          </div>

          <div class="field">
            <label for="linkInput">链接地址 (生成二维码，可选)</label>
            <input id="linkInput" type="url" placeholder="https://..." />
          </div>

          <div class="quick-actions">
            <button type="button" class="secondary" id="sampleButton">填入示例</button>
            <button type="button" class="secondary" id="clearButton">清空内容</button>
          </div>

          <div class="subgrid">
            <div class="field">
              <label for="templateSelect">卡片模板</label>
              <select id="templateSelect">
                <!-- Dynamically rendered by JS -->
              </select>
            </div>
            <div class="field">
              <label for="themeSelect">卡片风格</label>
              <select id="themeSelect">
                <!-- Dynamically rendered by JS -->
              </select>
            </div>
            <div class="field">
              <label for="fontSelect">字体选择</label>
              <select id="fontSelect">
                <!-- Dynamically rendered by JS -->
              </select>
            </div>
            <div class="field">
              <label for="ratioSelect">图片比例</label>
              <select id="ratioSelect">
                <option value="4:5" selected>4:5</option>
                <option value="1:1">1:1</option>
                <option value="9:16">9:16</option>
              </select>
            </div>
          </div>

          <div class="download-action">
            <button type="button" id="downloadButton">下载 PNG</button>
          </div>



          <a class="helper-link" href="https://github.com/walnut-a/text-card-maker.git" target="_blank" rel="noreferrer">View on GitHub</a>
        </form>

        <section class="panel preview-panel">
          <div class="preview-head">
            <div class="preview-copy-wrap">
              <h2 class="section-title">实时预览</h2>
            </div>
            <p class="dimension-label" id="dimensionLabel">900 × 1125</p>
          </div>

          <div class="canvas-shell">
            <canvas id="cardCanvas" width="900" height="1125"></canvas>
          </div>

          <button id="mobileDownloadButton" class="mobile-download-btn">下载 PNG</button>

          <p class="status" id="statusText"></p>
          <canvas id="qrCanvas" class="sr-only" width="280" height="280" aria-hidden="true"></canvas>
          <span class="sr-only" style="font-family: 'Noto Serif SC', serif;">字体预加载</span>
          <span class="sr-only" style="font-family: 'Noto Sans SC', sans-serif;">字体预加载</span>
        </section>
      </section>
    </main>
    <script>
      const sampleText = `把日常记录下来，并不是为了制造更多噪音。

真正有价值的分享，往往来自一次认真整理：把情绪沉淀，把线索串起来，把那些原本会被遗忘的瞬间，重新排成别人愿意读下去的样子。

一张好的文字卡片，不只是“截图更好看”。

它让信息有呼吸感，让重点有层次，也让转发这件事变得更克制、更体面。`;

      const summarySampleText = `把零散文字收成一句清楚的话，再安静地分享出去。`;

      const templates = {
        quote: {
          label: "长文",
          sample: sampleText,
          defaultRatio: "4:5",
        },
        summary: {
          label: "短句",
          sample: summarySampleText,
          defaultRatio: "1:1",
        },
      };

      const themes = {
        light: {
          label: "白霜",
          background(ctx, width, height) {
            ctx.fillStyle = "#FAFAFA";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#1a1a1a",
          title: "#000000",
          accent: "#000000",
          card: "#FAFAFA",
          cardStroke: "rgba(0, 0, 0, 0.15)",
          meta: "#999999",
          qrBg: "#FFFFFF",
        },
        dark: {
          label: "暗夜",
          background(ctx, width, height) {
            ctx.fillStyle = "#0A0A0A";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#EAEAEA",
          title: "#FFFFFF",
          accent: "#FFFFFF",
          card: "#0A0A0A",
          cardStroke: "rgba(255, 255, 255, 0.2)",
          meta: "#888888",
          qrBg: "#1A1A1A",
        },
        warm: {
          label: "暖沙",
          background(ctx, width, height) {
            ctx.fillStyle = "#F5F1E8";
            ctx.fillRect(0, 0, width, height);
            drawWarmGrain(ctx, width, height);
          },
          ink: "#2a2822",
          title: "#1A1814",
          accent: "#8B3A2B",
          card: "#F5F1E8",
          cardStroke: "rgba(0, 0, 0, 0.12)",
          meta: "#7A756D",
          qrBg: "#F5F1E8",
        },
        ocean: {
          label: "海蓝",
          background(ctx, width, height) {
            ctx.fillStyle = "#E8F4F8";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#1a3a4a",
          title: "#0d2838",
          accent: "#2563eb",
          card: "#E8F4F8",
          cardStroke: "rgba(37, 99, 235, 0.2)",
          meta: "#64748b",
          qrBg: "#E8F4F8",
        },
        forest: {
          label: "森林",
          background(ctx, width, height) {
            ctx.fillStyle = "#F0F4F0";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#1e3a1e",
          title: "#0f2a0f",
          accent: "#16a34a",
          card: "#F0F4F0",
          cardStroke: "rgba(22, 163, 74, 0.2)",
          meta: "#6b7c6b",
          qrBg: "#F0F4F0",
        },
        sunset: {
          label: "暮色",
          background(ctx, width, height) {
            ctx.fillStyle = "#FFF5F0";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#4a2a1a",
          title: "#3a1a0a",
          accent: "#ea580c",
          card: "#FFF5F0",
          cardStroke: "rgba(234, 88, 12, 0.2)",
          meta: "#92664f",
          qrBg: "#FFF5F0",
        },
        lavender: {
          label: "薰衣草",
          background(ctx, width, height) {
            ctx.fillStyle = "#F5F3FF";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#3a2a4a",
          title: "#2a1a3a",
          accent: "#8b5cf6",
          card: "#F5F3FF",
          cardStroke: "rgba(139, 92, 246, 0.2)",
          meta: "#7c6b8f",
          qrBg: "#F5F3FF",
        },
        ink: {
          label: "墨色",
          background(ctx, width, height) {
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, 0, width, height);
          },
          ink: "#d4d4d4",
          title: "#f5f5f5",
          accent: "#a3a3a3",
          card: "#1a1a1a",
          cardStroke: "rgba(163, 163, 163, 0.3)",
          meta: "#737373",
          qrBg: "#1a1a1a",
        },
      };

      const fonts = {
        serif: {
          label: "思源宋体",
          family: "'Noto Serif SC', serif"
        },
        sans: {
          label: "思源黑体",
          family: "'Noto Sans SC', sans-serif"
        },
        system: {
          label: "系统默认",
          family: "system-ui, -apple-system, sans-serif"
        },
      };

      const contentInput = document.getElementById("contentInput");
      const linkInput = document.getElementById("linkInput");
      const templateSelect = document.getElementById("templateSelect");
      const ratioSelect = document.getElementById("ratioSelect");
      let currentTemplate = "quote";
      let currentTheme = "light";
      let currentFont = "system"; // Default to system font
      let currentRatio = "4:5";

      const ratios = {
        "4:5": { width: 900, height: 1125 },
        "1:1": { width: 900, height: 900 },
        "9:16": { width: 900, height: 1600 },
      };

      const STORAGE_KEY = "text-card-maker.state.v1";
      const CARD_WIDTH = 900;
      const FIXED_FONT_SIZE = 48;

      let qrious = null;
      let persistTimer = null;

      const themeSelect = document.getElementById("themeSelect");
      const fontSelect = document.getElementById("fontSelect");

      Object.entries(templates).forEach(([key, template]) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = template.label;
        if (key === currentTemplate) {
          option.selected = true;
        }
        templateSelect.appendChild(option);
      });

      templateSelect.addEventListener('change', (e) => {
        currentTemplate = e.target.value;
        persistState();
        drawCard();
      });

      // Populate theme select
      Object.entries(themes).forEach(([key, theme]) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = theme.label;
        if (key === currentTheme) {
          option.selected = true;
        }
        themeSelect.appendChild(option);
      });

      themeSelect.addEventListener('change', (e) => {
        currentTheme = e.target.value;
        persistState();
        drawCard();
      });

      // Populate font select
      Object.entries(fonts).forEach(([key, font]) => {
        const option = document.createElement("option");
        option.value = key;
        option.textContent = font.label;
        if (key === currentFont) {
          option.selected = true;
        }
        fontSelect.appendChild(option);
      });

      fontSelect.addEventListener('change', (e) => {
        currentFont = e.target.value;
        persistState();
        drawCard();
      });

      ratioSelect.addEventListener('change', (e) => {
        currentRatio = e.target.value;
        persistState();
        drawCard();
      });

      const sampleButton = document.getElementById("sampleButton");
      const clearButton = document.getElementById("clearButton");
      const downloadButton = document.getElementById("downloadButton");
      const mobileDownloadButton = document.getElementById("mobileDownloadButton");
      const cardCanvas = document.getElementById("cardCanvas");
      const qrCanvas = document.getElementById("qrCanvas");
      const statusText = document.getElementById("statusText");

      const dimensionLabel = document.getElementById("dimensionLabel");
      const warmGrainCache = new Map();
      


      function bootQr() {
        if (!window.QRious) {
          return false;
        }
        qrious = new QRious({
          element: qrCanvas,
          size: 280,
          value: "",
          background: "white",
          foreground: "black",
          level: "M",
        });
        return true;
      }

      function ensureQrReady() {
        if (qrious) {
          return;
        }

        if (bootQr()) {
          drawCard();
          return;
        }

        const qrScript = document.getElementById("qriousScript");
        if (!qrScript || qrScript.dataset.waiting === "true") {
          statusText.textContent = "二维码库加载中，稍后会自动恢复。";
          return;
        }

        qrScript.dataset.waiting = "true";
        statusText.textContent = "二维码库加载中，稍后会自动恢复。";

        qrScript.addEventListener(
          "load",
          () => {
            qrScript.dataset.waiting = "false";
            statusText.textContent = "";
            if (bootQr()) {
              drawCard();
            }
          },
          { once: true }
        );

        qrScript.addEventListener(
          "error",
          () => {
            qrScript.dataset.waiting = "false";
            statusText.textContent = "二维码库加载失败，当前只能导出纯文字卡片。";
          },
          { once: true }
        );
      }

      function readPersistedState() {
        try {
          const raw = window.localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;

          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return null;

          return {
            content: typeof parsed.content === "string" ? parsed.content : "",
            link: typeof parsed.link === "string" ? parsed.link : "",
            template: typeof parsed.template === "string" ? parsed.template : "",
            theme: typeof parsed.theme === "string" ? parsed.theme : "",
            font: typeof parsed.font === "string" ? parsed.font : "",
            ratio: typeof parsed.ratio === "string" ? parsed.ratio : "",
          };
        } catch (error) {
          return null;
        }
      }

      function persistState() {
        try {
          window.localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              content: contentInput.value,
              link: linkInput.value,
              template: currentTemplate,
              theme: currentTheme,
              font: currentFont,
              ratio: currentRatio,
            })
          );
        } catch (error) {
          // Ignore storage failures to keep the editor usable in restricted environments.
        }
      }

      function schedulePersistState() {
        window.clearTimeout(persistTimer);
        persistTimer = window.setTimeout(() => {
          persistState();
        }, 180);
      }

      function applyPersistedState() {
        const saved = readPersistedState();
        if (!saved) return false;

        contentInput.value = saved.content;
        linkInput.value = saved.link;

        if (saved.template && templates[saved.template]) {
          currentTemplate = saved.template;
          templateSelect.value = saved.template;
        }

        if (saved.theme && themes[saved.theme]) {
          currentTheme = saved.theme;
          themeSelect.value = saved.theme;
        }

        if (saved.font && fonts[saved.font]) {
          currentFont = saved.font;
          fontSelect.value = saved.font;
        }

        if (saved.ratio && ratios[saved.ratio]) {
          currentRatio = saved.ratio;
          ratioSelect.value = saved.ratio;
        }

        return true;
      }

      function normalizeText(input) {
        return input.replace(/\r\n/g, "\n").replace(/\u00a0/g, " ").trim();
      }

      function addSpacesBetweenCJKAndAlphanumeric(text) {
        // Add space between CJK characters and English letters/numbers
        return text
          .replace(/([\u4e00-\u9fa5\u3040-\u30ff])([a-zA-Z0-9])/g, '$1 $2')
          .replace(/([a-zA-Z0-9])([\u4e00-\u9fa5\u3040-\u30ff])/g, '$1 $2');
      }

      function parseContent(text) {
        const normalized = normalizeText(text);
        const blocks = normalized
          ? normalized
              .split(/\n\s*\n+/)
              .map((block) => addSpacesBetweenCJKAndAlphanumeric(block.replace(/\n+/g, " ").replace(/\s+/g, " ").trim()))
              .filter(Boolean)
          : [];

        // No title extraction - treat all content as body paragraphs
        return { title: "", paragraphs: blocks, normalized };
      }

      function isValidUrl(value) {
        if (!value) return false;
        try {
          const url = new URL(value);
          return /^https?:$/.test(url.protocol);
        } catch (error) {
          return false;
        }
      }

      function wrapText(context, text, maxWidth) {
        const lines = [];
        let current = "";
        const avoidStartChars = ['，', '。', '、', '；', '：', '？', '！', '”', '’', '》', '】', '）', ',', '.', '?', '!', '"', '\'', '>', ']', ')'];

        for (let i = 0; i < text.length; i++) {
          const char = text[i];
          const testLine = current + char;
          
          if (context.measureText(testLine).width > maxWidth && current) {
            // Check if current char is a punctuation that shouldn't start a line
            if (avoidStartChars.includes(char)) {
               // Push the char to current line anyway, let it overflow slightly
               current += char;
               continue;
            } else {
              lines.push(current);
              current = char.trimStart();
            }
          } else {
            current = testLine;
          }
        }

        if (current) {
          lines.push(current);
        }

        return lines.length ? lines : [""];
      }

      function truncateLine(context, text, maxWidth) {
        if (context.measureText(text).width <= maxWidth) return text;
        let result = text;
        while (result.length > 1 && context.measureText(result + "…").width > maxWidth) {
          result = result.slice(0, -1);
        }
        return result + "…";
      }

      function roundedRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function setupCanvas(canvas, width, height) {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = "100%";
        canvas.style.height = "auto";
        const ctx = canvas.getContext("2d");
        ctx.scale(dpr, dpr);
        return ctx;
      }

      function drawWarmGrain(context, width, height) {
        const key = `${width}x${height}`;
        if (!warmGrainCache.has(key)) {
          const grainCanvas = document.createElement("canvas");
          grainCanvas.width = width;
          grainCanvas.height = height;
          const grainCtx = grainCanvas.getContext("2d");
          grainCtx.fillStyle = "rgba(0,0,0,0.015)";
          for (let i = 0; i < width; i += 4) {
            for (let j = 0; j < height; j += 4) {
              if (Math.random() > 0.5) grainCtx.fillRect(i, j, 2, 2);
            }
          }
          warmGrainCache.set(key, grainCanvas);
        }
        context.drawImage(warmGrainCache.get(key), 0, 0, width, height);
      }

      function getDomainLabel(value) {
        if (!isValidUrl(value)) return "";
        try {
          return new URL(value).hostname.replace(/^www\./, "");
        } catch (error) {
          return "";
        }
      }

      function getQuoteLayout(options) {
        const { paragraphs, selectedFont, width, maxCardHeight, hasQr } = options;
        const bodySize = FIXED_FONT_SIZE;
        const lineHeightRatio = 1.7;
        const lineHeight = bodySize * lineHeightRatio;
        const frameMargin = width * 0.02;
        const frameX = frameMargin;
        const frameY = frameMargin;
        const frameWidth = width - (frameMargin * 2);
        const contentPadX = frameWidth * 0.08;
        const contentPadTop = frameWidth * 0.055;
        const contentPadBot = frameWidth * 0.05;
        const contentX = frameX + contentPadX;
        const contentY = frameY + contentPadTop;
        const contentWidth = frameWidth - (contentPadX * 2);
        const footerHeight = hasQr ? 180 : 0;
        const footerWithPadding = footerHeight > 0 ? footerHeight + 35 : 0;
        const tempCanvas = document.createElement("canvas");
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.font = `400 ${bodySize}px ${selectedFont.family}`;

        const bodyBlocks = paragraphs.map((paragraph) => ({
          lines: wrapText(tempCtx, paragraph, contentWidth),
          lineHeight,
        }));

        let contentHeight = bodySize;
        if (paragraphs.length === 0) {
          contentHeight += lineHeight;
        } else {
          for (let i = 0; i < bodyBlocks.length; i++) {
            contentHeight += bodyBlocks[i].lines.length * lineHeight;
            if (i < bodyBlocks.length - 1) {
              contentHeight += bodySize * 0.8;
            }
          }
        }

        let calculatedHeight = frameMargin * 2 + contentPadTop + contentHeight + contentPadBot + footerWithPadding;
        let needsTruncation = false;
        if (calculatedHeight > maxCardHeight) {
          needsTruncation = true;
          calculatedHeight = maxCardHeight;
        }

        return {
          variant: "quote",
          bodyBlocks,
          bodySize,
          calculatedHeight,
          contentPadBot,
          contentPadTop,
          contentWidth,
          contentX,
          contentY,
          footerHeight,
          footerWithPadding,
          frameHeight: calculatedHeight - frameMargin * 2,
          frameMargin,
          frameWidth,
          frameX,
          frameY,
          needsTruncation,
          selectedFont,
        };
      }

      function getSummaryLayout(options) {
        const { paragraphs, selectedFont, width, maxCardHeight, hasQr, ratioKey, link } = options;
        const frameMargin = width * 0.02;
        const frameX = frameMargin;
        const frameY = frameMargin;
        const frameWidth = width - (frameMargin * 2);
        const joinedText = paragraphs.join(" ");
        const calculatedHeight = maxCardHeight;
        const frameHeight = calculatedHeight - frameMargin * 2;
        const bodySizeMap = hasQr ? {
          "4:5": 86,
          "1:1": 80,
          "9:16": 92,
        } : {
          "4:5": 82,
          "1:1": 76,
          "9:16": 88,
        };
        const bodySize = bodySizeMap[ratioKey] || 84;
        const fontWeight = hasQr ? 700 : 600;
        const lineHeight = bodySize * (hasQr ? 1.18 : 1.24);
        const contentX = frameX + frameWidth * (hasQr ? 0.085 : 0.11);
        const contentWidth = frameWidth * (hasQr ? (ratioKey === "9:16" ? 0.74 : 0.78) : (ratioKey === "9:16" ? 0.68 : 0.7));
        const qrSize = hasQr ? 74 : 0;
        const footerHeight = hasQr ? 106 : 0;
        const maxLines = ratioKey === "9:16" ? 5 : 4;
        const tempCanvas = document.createElement("canvas");
        const tempCtx = tempCanvas.getContext("2d");
        tempCtx.font = `${fontWeight} ${bodySize}px ${selectedFont.family}`;

        let lines = joinedText ? wrapText(tempCtx, joinedText, contentWidth) : [];
        let needsTruncation = false;

        if (!lines.length) {
          lines = ["请输入文字..."];
        }

        if (lines.length > maxLines) {
          needsTruncation = true;
          lines = lines.slice(0, maxLines);
          lines[maxLines - 1] = truncateLine(tempCtx, lines[maxLines - 1], contentWidth);
        }

        const textHeight = lines.length * lineHeight;
        const contentY = hasQr
          ? frameY + (ratioKey === "9:16" ? 128 : 102)
          : Math.max(frameY + 118, frameY + (frameHeight - textHeight) / 2 - bodySize * 0.14);
        const textBottom = contentY + textHeight;
        const footerY = frameY + frameHeight - footerHeight - 56;

        return {
          variant: "summary",
          bodySize,
          calculatedHeight,
          contentWidth,
          contentX,
          contentY,
          fontWeight,
          footerHeight,
          footerY,
          frameHeight,
          frameMargin,
          frameWidth,
          frameX,
          frameY,
          hasQr,
          lineHeight,
          lines,
          linkLabel: getDomainLabel(link),
          needsTruncation,
          qrSize,
          selectedFont,
          textBottom,
        };
      }

      function renderQuoteContent(context, layout, options) {
        const { paragraphs, selectedTheme, hasQr, qrCanvas, contentWidth } = options;
        const {
          bodyBlocks,
          bodySize,
          contentPadBot,
          contentX,
          contentY,
          footerHeight,
          footerWithPadding,
          frameHeight,
          frameX,
          frameY,
          frameWidth,
          needsTruncation,
          selectedFont,
        } = layout;

        const contentBottomLimit = frameY + frameHeight - contentPadBot - footerWithPadding;
        context.textBaseline = "alphabetic";
        context.font = `400 ${bodySize}px ${selectedFont.family}`;
        if (context.letterSpacing !== undefined) {
          context.letterSpacing = "0.5px";
        }
        context.fillStyle = selectedTheme.ink;

        let cursorY = contentY + bodySize;

        if (!paragraphs.length) {
          context.fillStyle = selectedTheme.meta;
          context.fillText("请输入文字...", contentX, cursorY);
        }

        let roomRanOut = false;
        for (let blockIndex = 0; blockIndex < bodyBlocks.length; blockIndex += 1) {
          const block = bodyBlocks[blockIndex];
          for (let lineIndex = 0; lineIndex < block.lines.length; lineIndex += 1) {
            const remaining = contentBottomLimit - cursorY;

            if (remaining < block.lineHeight * 0.5) {
              roomRanOut = true;
              break;
            }

            let line = block.lines[lineIndex];
            const hasMoreLines = lineIndex < block.lines.length - 1;
            const hasMoreBlocks = blockIndex < bodyBlocks.length - 1;
            const hasMoreContent = hasMoreLines || hasMoreBlocks;

            if (needsTruncation && remaining < block.lineHeight * 1.5 && hasMoreContent) {
              line = truncateLine(context, line, contentWidth);
              context.fillText(line, contentX, cursorY);
              roomRanOut = true;
              break;
            }

            context.fillText(line, contentX, cursorY);
            cursorY += block.lineHeight;
          }
          if (roomRanOut) break;

          if (blockIndex < bodyBlocks.length - 1) {
            cursorY += bodySize * 0.8;
          }
        }

        if (hasQr) {
          const footerY = frameY + frameHeight - contentPadBot - footerHeight + 35;
          const dividerY = footerY - 35;
          context.strokeStyle = selectedTheme.cardStroke;
          context.lineWidth = 1;
          context.beginPath();
          context.moveTo(contentX, dividerY);
          context.lineTo(contentX + contentWidth, dividerY);
          context.stroke();

          const qrSize = 120;
          const qrX = contentX + contentWidth - qrSize;
          const qrY = footerY;

          context.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
          context.fillStyle = selectedTheme.meta;
          context.font = `400 26px ${selectedFont.family}`;
          context.textAlign = "right";
          const textRightEdge = qrX - 20;
          const textCenterY = footerY + qrSize / 2;
          context.fillText("扫码查看", textRightEdge, textCenterY - 8);
          context.fillText("原文内容", textRightEdge, textCenterY + 26);
          context.textAlign = "left";
        }
      }

      function renderSummaryContent(context, layout, options) {
        const { selectedTheme, hasQr, qrCanvas } = options;
        const {
          bodySize,
          contentWidth,
          contentX,
          contentY,
          fontWeight,
          footerY,
          lines,
          linkLabel,
          lineHeight,
          frameWidth,
          frameX,
          qrSize,
          selectedFont,
          textBottom,
        } = layout;

        context.textBaseline = "alphabetic";
        context.font = `${fontWeight} ${bodySize}px ${selectedFont.family}`;
        context.fillStyle = lines[0] === "请输入文字..." ? selectedTheme.meta : selectedTheme.ink;

        let cursorY = contentY + bodySize;
        for (const line of lines) {
          context.fillText(line, contentX, cursorY);
          cursorY += lineHeight;
        }

        if (hasQr) {
          const dividerY = footerY - 24;
          const qrX = frameX + frameWidth - 86 - qrSize;
          const qrY = footerY;
          const metaX = contentX;
          const metaWidth = qrX - metaX - 28;

          context.strokeStyle = selectedTheme.cardStroke;
          context.lineWidth = 1;
          context.beginPath();
          context.moveTo(contentX, dividerY);
          context.lineTo(frameX + frameWidth - 86, dividerY);
          context.stroke();

          context.drawImage(qrCanvas, qrX, qrY, qrSize, qrSize);
          context.fillStyle = selectedTheme.meta;
          context.font = `500 18px ${selectedFont.family}`;
          context.fillText("查看原文", metaX, qrY + 22);
          context.font = `400 18px ${selectedFont.family}`;
          context.fillText(linkLabel || "链接二维码", metaX, qrY + 50, metaWidth);
        }
      }

      function drawCard() {
        const selectedTheme = themes[currentTheme];
        const selectedFont = fonts[currentFont];
        const text = contentInput.value;
        const link = linkInput.value.trim();
        const { paragraphs } = parseContent(text);
        const hasQr = !!(qrious && isValidUrl(link));

        statusText.textContent = isValidUrl(link) || !link ? "" : "链接格式不正确，二维码已自动关闭。";

        if (hasQr) {
          qrious.value = link;
          qrious.size = 280;
          qrious.foreground = selectedTheme.ink;
          qrious.background = selectedTheme.card;
        }

        const selectedRatio = ratios[currentRatio] || ratios["4:5"];
        const width = selectedRatio.width || CARD_WIDTH;
        const maxCardHeight = selectedRatio.height;
        const layout = currentTemplate === "summary"
          ? getSummaryLayout({
              paragraphs,
              selectedFont,
              width,
              maxCardHeight,
              hasQr,
              ratioKey: currentRatio,
              link,
            })
          : getQuoteLayout({
              paragraphs,
              selectedFont,
              width,
              maxCardHeight,
              hasQr,
            });
        const height = layout.calculatedHeight;
        const frameHeight = layout.frameHeight;
        const frameX = layout.frameX;
        const frameY = layout.frameY;
        const frameWidth = layout.frameWidth;

        const ctx = setupCanvas(cardCanvas, width, height);
        dimensionLabel.textContent = width + " × " + Math.round(height);
        const cardCornerRadius = 10;

        // 1. Base Background with rounded corners
        ctx.save();
        roundedRect(ctx, 0, 0, width, height, cardCornerRadius);
        ctx.clip();
        selectedTheme.background(ctx, width, height);
        ctx.restore();

        if (layout.variant !== "summary") {
          // 2. Card Frame with rounded corners
          ctx.save();
          ctx.strokeStyle = selectedTheme.cardStroke;
          ctx.lineWidth = 1;
          roundedRect(ctx, frameX, frameY, frameWidth, frameHeight, cardCornerRadius);
          ctx.stroke();
          ctx.restore();
        }

        if (layout.variant === "summary") {
          renderSummaryContent(ctx, layout, { selectedTheme, hasQr, qrCanvas });
        } else {
          renderQuoteContent(ctx, layout, {
            paragraphs,
            selectedTheme,
            hasQr,
            qrCanvas,
            contentWidth: layout.contentWidth,
          });
        }
      }

      function downloadImage() {
        const safeName = "share-card-" + Date.now() + ".png";
        if (cardCanvas.toBlob) {
          cardCanvas.toBlob((blob) => {
            if (!blob) return;
            const link = document.createElement("a");
            const objectUrl = URL.createObjectURL(blob);
            link.download = safeName;
            link.href = objectUrl;
            link.click();
            URL.revokeObjectURL(objectUrl);
          }, "image/png");
          return;
        }

        const link = document.createElement("a");
        link.download = safeName;
        link.href = cardCanvas.toDataURL("image/png");
        link.click();
      }

      function fillSample() {
        const activeTemplate = templates[currentTemplate] || templates.quote;
        contentInput.value = activeTemplate.sample;
        linkInput.value = "https://github.com/walnut-a/text-card-maker";

        themeSelect.value = "light";
        currentTheme = "light";

        fontSelect.value = "system";
        currentFont = "system";

        ratioSelect.value = activeTemplate.defaultRatio;
        currentRatio = activeTemplate.defaultRatio;

        persistState();
        drawCard();
      }

      function clearAll() {
        contentInput.value = "";
        linkInput.value = "";
        persistState();
        drawCard();
      }

      function bindRealtimeRefresh() {
        [contentInput, linkInput].forEach((element) => {
          element.addEventListener("input", () => {
            schedulePersistState();
            drawCard();
          });
          element.addEventListener("change", () => {
            persistState();
            drawCard();
          });
        });
      }

      sampleButton.addEventListener("click", fillSample);
      clearButton.addEventListener("click", clearAll);
      downloadButton.addEventListener("click", downloadImage);
      mobileDownloadButton.addEventListener("click", downloadImage);
      bindRealtimeRefresh();
      ensureQrReady();
      applyPersistedState();

      // Initial draw
      drawCard();

      // Preload web fonts in background for better performance when switching
      if (document.fonts && document.fonts.load) {
        // Preload both fonts with specific weight
        Promise.all([
          document.fonts.load("400 54px 'Noto Serif SC'"),
          document.fonts.load("400 54px 'Noto Sans SC'")
        ]).then(() => {
          // Redraw if currently using serif font to fix any rendering issues
          if (currentFont === 'serif') {
            drawCard();
          }
        }).catch((error) => {
          console.warn("字体预加载失败:", error);
        });
      }
    </script>
  </body>
</html>
